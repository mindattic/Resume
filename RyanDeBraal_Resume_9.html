<!DOCTYPE html>
<html lang="en" data-theme="light" data-profile="classic">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan DeBraal — Resume</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Roboto:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap');

:root {
  --bg:#0d0f12; --bg2:#13161b; --bg3:#1a1e25; --border:#2a2f3a;
  --accent:#6ba3e8; --accent2:#90bbf0;
  --text:#e8eaf0; --text2:#9aa0b0; --text3:#5c6275;
  --tag-bg:#1a2030; --tag-text:#6ba3e8; --tag-border:#2a3a54;
  --tag-hover-bg:#6ba3e8; --tag-hover-text:#0d0f12;
  --rule:#3d6fa3; --font-resume:'Outfit',system-ui,sans-serif;
}
[data-theme="light"] {
  --bg:#fff; --bg2:#f8f9fb; --bg3:#f0f2f5; --border:#e2e6ea;
  --accent:#1b4f8c; --accent2:#2563b0;
  --text:#1a1a2e; --text2:#4a5568; --text3:#718096;
  --tag-bg:#eef2f8; --tag-text:#1b4f8c; --tag-border:#c5d5eb;
  --tag-hover-bg:#1b4f8c; --tag-hover-text:#fff;
  --rule:#2c5f8a;
}
[data-theme="spring"] {
  --bg:#f0faf2; --bg2:#e6f7ea; --bg3:#d4f0da; --border:#b2d9bc;
  --accent:#2e7d4f; --accent2:#3a9e63;
  --text:#1a3325; --text2:#3d6b52; --text3:#6a9a7c;
  --tag-bg:#d4f0da; --tag-text:#1e6b3a; --tag-border:#90c9a0;
  --tag-hover-bg:#2e7d4f; --tag-hover-text:#fff;
  --rule:#4caf70;
}
[data-theme="summer"] {
  --bg:#fffdf0; --bg2:#fff9e0; --bg3:#fff3c4; --border:#fad97a;
  --accent:#c47a00; --accent2:#e69500;
  --text:#2d1f00; --text2:#5c4010; --text3:#9a7030;
  --tag-bg:#fff3c4; --tag-text:#8a5600; --tag-border:#fad97a;
  --tag-hover-bg:#c47a00; --tag-hover-text:#fff;
  --rule:#f0b429;
}
[data-theme="autumn"] {
  --bg:#1c1008; --bg2:#231408; --bg3:#2d1a0c; --border:#5c3010;
  --accent:#e8762a; --accent2:#f0943c;
  --text:#f5dfc0; --text2:#c4a070; --text3:#8a6040;
  --tag-bg:#2d1a0c; --tag-text:#e8762a; --tag-border:#5c3010;
  --tag-hover-bg:#e8762a; --tag-hover-text:#1c1008;
  --rule:#c05c18;
}
[data-theme="winter"] {
  --bg:#e8f4fc; --bg2:#d8ecf8; --bg3:#c4e0f4; --border:#90c4e8;
  --accent:#1a5a8c; --accent2:#2272b0;
  --text:#0a1828; --text2:#2a4860; --text3:#507898;
  --tag-bg:#c4e0f4; --tag-text:#1a5a8c; --tag-border:#90c4e8;
  --tag-hover-bg:#1a5a8c; --tag-hover-text:#e8f4fc;
  --rule:#3a80b0;
}
[data-theme="matrix"] {
  --bg:#000; --bg2:#000d00; --bg3:#001400; --border:#003800;
  --accent:#00ff41; --accent2:#00cc33;
  --text:#00ff41; --text2:#00cc33; --text3:#007a1e;
  --tag-bg:#001400; --tag-text:#00ff41; --tag-border:#003800;
  --tag-hover-bg:#00ff41; --tag-hover-text:#000;
  --rule:#00aa2a;
}
[data-theme="horror"] {
  --bg:#0a0000; --bg2:#0a0000; --bg3:#100000; --border:#2a0000;
  --accent:#cc2200; --accent2:#ff3300;
  --text:#c8b8a8; --text2:#907060; --text3:#503020;
  --tag-bg:#150000; --tag-text:#cc2200; --tag-border:#3a0000;
  --tag-hover-bg:#cc2200; --tag-hover-text:#0a0000;
  --rule:#500000;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;-webkit-font-smoothing:antialiased;}
body{font-family:var(--font-resume);background:var(--bg2);color:var(--text);min-height:100vh;transition:background 0.3s,color 0.3s;position:relative;overflow-x:hidden;}

/* ── CANVAS (animations live here, behind everything) ── */
#fx-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

/* ── TOOLBAR ── */
#toolbar{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
#toolbar-name{font-size:14px;font-weight:500;color:var(--text);margin-right:auto;white-space:nowrap;}
.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}
.tb-label{font-size:11px;color:var(--text3);white-space:nowrap;}
select.tb-sel{font-family:var(--font-resume);font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text);cursor:pointer;outline:none;transition:all 0.15s;}
select.tb-sel:hover{border-color:var(--accent);}
.tb-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);color:var(--text2);font-family:var(--font-resume);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.tb-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--accent);}
.tb-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.tb-btn.primary:hover{opacity:0.85;}
.tb-btn svg{width:13px;height:13px;fill:currentColor;flex-shrink:0;}

/* Matrix font override */
[data-theme="matrix"] .tb-btn,[data-theme="matrix"] select.tb-sel,[data-theme="matrix"] #toolbar-name{font-family:'Courier New',monospace;}
/* Horror styles */
[data-theme="horror"] #resume{border-color:#3a0000;box-shadow:0 0 60px rgba(150,0,0,0.12);}
[data-theme="horror"] .r-name{color:#c8b8a8;text-shadow:0 0 20px rgba(180,0,0,0.4);}
[data-theme="horror"] body{cursor:none;}
/* Flashlight overlay — punches a radial hole in solid black */
#horror-overlay{
  display:none;
  position:fixed;inset:0;z-index:5;pointer-events:none;
  --lx:50vw;--ly:50vh;
  background:radial-gradient(circle 140px at var(--lx) var(--ly),
    transparent 0%,
    rgba(0,0,0,0.15) 60%,
    rgba(0,0,0,0.7) 90%,
    rgba(0,0,0,0.97) 100%);
  transition:background 0.05s;
}
/* Custom cursor crosshair for horror */
#horror-cursor{
  display:none;position:fixed;z-index:6;pointer-events:none;
  width:24px;height:24px;margin:-12px 0 0 -12px;
}
[data-theme="horror"] #horror-overlay{display:block;}
[data-theme="horror"] #horror-cursor{display:block;}

/* ── RESUME DOC ── */
#resume{max-width:820px;margin:28px auto;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:52px 60px;font-family:var(--font-resume);position:relative;z-index:10;transition:background 0.3s,border-color 0.3s;}
[data-theme="matrix"] #resume{border-color:#00ff41;box-shadow:0 0 30px rgba(0,255,65,0.15);}

/* ── HEADER ── */
.r-name{font-family:var(--font-resume);font-size:36px;font-weight:400;text-align:center;color:var(--text);letter-spacing:-0.01em;margin-bottom:5px;}
.r-title{text-align:center;font-size:13px;color:var(--accent);letter-spacing:0.03em;margin-bottom:5px;font-family:var(--font-resume);}
.r-contact{text-align:center;font-size:12px;color:var(--text3);font-family:var(--font-resume);border-bottom:1.5px solid var(--rule);padding-bottom:14px;}
.r-contact a{color:var(--accent);text-decoration:none;border-bottom:1px solid rgba(107,163,232,0.2);transition:border-color 0.2s,color 0.2s;}
.r-contact a:hover{border-bottom-color:var(--accent);}
[data-theme="light"] .r-contact a{border-bottom-color:rgba(27,79,140,0.2);}
[data-theme="light"] .r-contact a:hover{border-bottom-color:#1b4f8c;}
[data-theme="spring"] .r-contact a{border-bottom-color:rgba(46,125,79,0.2);}
[data-theme="summer"] .r-contact a{border-bottom-color:rgba(196,122,0,0.2);}
[data-theme="autumn"] .r-contact a{border-bottom-color:rgba(232,118,42,0.25);}
[data-theme="winter"] .r-contact a{border-bottom-color:rgba(26,90,140,0.2);}
[data-theme="matrix"] .r-contact a{border-bottom-color:rgba(0,255,65,0.2);}

/* ── SECTION RULE ── */
.r-sec{font-family:var(--font-resume);font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent);border-bottom:1px solid var(--rule);padding-bottom:4px;margin:22px 0 11px;}

/* ── SUMMARY ── */
.r-summary{font-size:13px;line-height:1.75;color:var(--text2);}

/* ── SKILLS ── */
.r-skill-row{display:flex;gap:8px;margin-bottom:5px;align-items:baseline;flex-wrap:wrap;}
.r-skill-label{font-family:var(--font-resume);font-size:11px;font-weight:500;color:var(--text);white-space:nowrap;min-width:155px;}
.r-skill-tags{display:flex;flex-wrap:wrap;gap:4px;}

/* ── TAG ── */
.tag{display:inline-flex;align-items:center;font-family:var(--font-resume);font-size:11px;padding:2px 9px;background:var(--tag-bg);color:var(--tag-text);border:1px solid var(--tag-border);border-radius:20px;cursor:default;transition:all 0.12s;position:relative;white-space:nowrap;}
.tag:hover{background:var(--tag-hover-bg);color:var(--tag-hover-text);border-color:var(--tag-hover-bg);transform:translateY(-1px);z-index:20;}
.tag[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);font-size:11px;padding:4px 10px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:999;font-family:var(--font-resume);}
.tag[data-tip]:hover::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--text);pointer-events:none;z-index:999;}
[data-theme="matrix"] .tag{text-shadow:0 0 8px currentColor;}

/* ── EXPERIENCE ── */
.r-job{margin-bottom:20px;}
.r-job:last-child{margin-bottom:0;}
.r-job-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px;margin-bottom:2px;}
.r-job-title{font-size:14px;font-weight:600;color:var(--text);}
.r-job-company{font-size:14px;font-weight:400;color:var(--accent);}
.r-job-dates{font-family:var(--font-resume);font-size:11px;color:var(--text3);}
.r-job-meta{font-size:12px;color:var(--text3);margin-bottom:5px;}
.r-job-tech{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px;}
.r-job-bullets{list-style:none;padding:0;}
.r-job-bullets li{font-size:13px;line-height:1.65;color:var(--text2);padding-left:15px;position:relative;margin-bottom:4px;}
.r-job-bullets li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:10px;top:3px;}
.r-job-bullets li strong{color:var(--text);font-weight:500;}

/* ── PROJECTS ── */
.r-project{margin-bottom:9px;}
.r-project-name{font-weight:500;font-size:13px;color:var(--text);}
.r-project-desc{font-size:13px;color:var(--text2);line-height:1.65;}

/* ── EDUCATION ── */
.r-edu-row{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:4px;margin-bottom:4px;}
.r-edu-degree{font-size:13px;font-weight:500;color:var(--text);}
.r-edu-school{font-size:13px;color:var(--text2);}
.r-edu-dates{font-family:var(--font-resume);font-size:11px;color:var(--text3);}
.r-edu-note{font-size:12px;color:var(--accent);font-style:italic;}

/* ── PATENTS ── */
.r-patent{margin-bottom:8px;}
.r-patent-title{font-size:13px;font-weight:500;color:var(--text);}
.r-patent-num{font-family:var(--font-resume);font-size:11px;color:var(--accent);margin-left:6px;}
.r-patent-desc{font-size:13px;color:var(--text2);line-height:1.6;}

/* ── PITCH PROFILE ── */
.pitch-summary-box{background:var(--tag-bg);border:1px solid var(--tag-border);border-radius:10px;padding:20px 24px;margin-bottom:16px;}
.pitch-summary-box p{font-size:14px;line-height:1.8;color:var(--text);}
.pitch-highlights{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.pitch-highlight{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;}
.pitch-highlight .ph-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:4px;}
.pitch-highlight .ph-body{font-size:12px;color:var(--text2);line-height:1.5;}

/* ── PRINT ── */
@media print{
  body{background:#fff;}
  #toolbar{display:none!important;}
  #fx-canvas{display:none!important;}
  #resume{margin:0;border:none;border-radius:0;padding:32px 44px;max-width:100%;background:#fff;box-shadow:none;}
  :root{--bg:#fff;--bg2:#fff;--text:#1a1a2e;--text2:#4a5568;--text3:#718096;--accent:#1b4f8c;--rule:#2c5f8a;--tag-bg:#eef2f8;--tag-text:#1b4f8c;--tag-border:#c5d5eb;--border:#e2e6ea;}
  .tag:hover{transform:none;}
  .tag[data-tip]:hover::after,.tag[data-tip]:hover::before{display:none;}
}
</style>

// CANVAS FX

const canvas = document.getElementById('fx-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function stopFX() {
  if (fxAnim) { cancelAnimationFrame(fxAnim); fxAnim = null; }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles = [];
  stopHorror();
  // Reset horror overlay when switching away
  const overlay=document.getElementById('horror-overlay');
  if(overlay) overlay.style.background='';
}

// ── SPRING: growing grass blades ──────────────────────────────────────────────
function startSpring() {
  const blades = Array.from({length:80},(_,i)=>({
    x: (i/80)*canvas.width + Math.random()*20-10,
    height: 20 + Math.random()*60,
    maxH: 40 + Math.random()*80,
    width: 2 + Math.random()*3,
    color: `hsl(${110+Math.random()*30},${60+Math.random()*20}%,${30+Math.random()*20}%)`,
    sway: Math.random()*Math.PI*2,
    swaySpeed: 0.02 + Math.random()*0.02,
    grown: 0,
  }));
  // Floating pollen dots
  const pollen = Array.from({length:25},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    r:1+Math.random()*2, vy:-0.3-Math.random()*0.4,
    vx:(Math.random()-0.5)*0.5, alpha:0.4+Math.random()*0.4,
  }));
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const base = canvas.height;
    blades.forEach(b=>{
      b.grown = Math.min(b.grown+0.3, b.maxH);
      b.sway += b.swaySpeed;
      const lean = Math.sin(b.sway)*8;
      ctx.beginPath();
      ctx.moveTo(b.x, base);
      ctx.quadraticCurveTo(b.x+lean/2, base-b.grown*0.6, b.x+lean, base-b.grown);
      ctx.lineWidth = b.width;
      ctx.strokeStyle = b.color;
      ctx.lineCap = 'round';
      ctx.stroke();
    });
    pollen.forEach(p=>{
      p.y += p.vy; p.x += p.vx;
      if(p.y<-10) { p.y=canvas.height+10; p.x=Math.random()*canvas.width; }
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(200,220,100,${p.alpha})`;
      ctx.fill();
    });
    fxAnim = requestAnimationFrame(draw);
  }
  draw();
}

// ── SUMMER: wandering bees that compete for flowers ───────────────────────────
function startSummer() {
  const W = ()=>canvas.width, H = ()=>canvas.height;
  const FLOWER_DETECT = 120; // radius in which a bee notices a flower

  // Flowers only spawn in left/right thirds (center is resume)
  function flowerX() {
    return Math.random()<0.5
      ? 30 + Math.random()*(W()*0.28)          // left third
      : W()*0.72 + Math.random()*(W()*0.28-30); // right third
  }

  const COLORS = ['#ff6b8a','#ff9f43','#ffd32a','#ff6348','#eccc68','#ff4757','#a29bfe','#fd79a8'];
  const flowers = [];
  function spawnFlower() {
    flowers.push({
      x: flowerX(), y: 60 + Math.random()*(H()-100),
      r: 18+Math.random()*14,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      alpha:0, phase:'fadein', age:0,
      petalAngle:Math.random()*Math.PI,
      claimedBy:null,  // bee reference that has claimed this flower
    });
  }
  for(let i=0;i<7;i++) spawnFlower();

  // Bees: wander randomly with smooth steering, detect flowers within range
  const bees = Array.from({length:10},()=>{
    const side = Math.random()<0.5;
    return {
      x: side ? Math.random()*W()*0.3 : W()*0.7+Math.random()*W()*0.3,
      y: 60+Math.random()*(H()-80),
      vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
      // smooth wander via angle
      angle:Math.random()*Math.PI*2,
      speed:1.2+Math.random()*1.2,
      wobble:0, wobbleS:0.13+Math.random()*0.1,
      size:10+Math.random()*6,
      wanderTimer:0,
      state:'wander',  // wander | chase | land | onflower | liftoff
      target:null, lx:0, ly:0, landTimer:0,
    };
  });

  let fc=0;

  function drawFlower(f) {
    if(f.alpha<=0) return;
    ctx.save(); ctx.globalAlpha=f.alpha;
    const isHarvested = f.claimedBy && f.phase==='visited';
    for(let i=0;i<6;i++){
      const a=f.petalAngle+(i/6)*Math.PI*2;
      ctx.beginPath();
      ctx.ellipse(f.x+Math.cos(a)*f.r*0.65,f.y+Math.sin(a)*f.r*0.65,f.r*0.5,f.r*0.3,a,0,Math.PI*2);
      ctx.fillStyle=isHarvested?'#ccc':f.color; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r*0.38,0,Math.PI*2);
    ctx.fillStyle=isHarvested?'#aaa':'#fff176'; ctx.fill();
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r*0.22,0,Math.PI*2);
    ctx.fillStyle=isHarvested?'#999':'#f9a825'; ctx.fill();
    ctx.restore();
  }

  function drawBee(b,facing) {
    ctx.save(); ctx.translate(b.x,b.y);
    if(b.state==='onflower') ctx.translate(0,Math.sin(b.wobble*3)*2);
    ctx.rotate(facing+Math.PI/2);
    ctx.beginPath(); ctx.ellipse(0,0,b.size*0.45,b.size*0.7,0,0,Math.PI*2);
    ctx.fillStyle='#f5c400'; ctx.fill();
    [-4,-1,2].forEach(off=>{
      ctx.beginPath(); ctx.fillStyle='rgba(20,10,0,0.75)';
      ctx.ellipse(0,off*b.size*0.18,b.size*0.44,b.size*0.13,0,0,Math.PI*2);
      ctx.fill();
    });
    const fs=b.state==='onflower'?1.5:5;
    [[-1,-1],[1,-1]].forEach(([sx,sy])=>{
      ctx.beginPath();
      ctx.ellipse(sx*b.size*0.65,sy*b.size*0.2,b.size*0.55,b.size*0.28,Math.PI*0.18,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,240,255,${0.45+Math.sin(b.wobble*fs)*0.3})`; ctx.fill();
    });
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    fc++;

    // Spawn new flowers periodically in side thirds only
    if(fc%200===0 && flowers.filter(f=>f.phase!=='done').length<9) spawnFlower();
    // Clean up done flowers
    for(let i=flowers.length-1;i>=0;i--) if(flowers[i].phase==='done') flowers.splice(i,1);

    // Update flowers
    flowers.forEach(f=>{
      f.age++;
      if(f.phase==='fadein')  { f.alpha=Math.min(1,f.alpha+0.012); if(f.alpha>=1){f.phase='bloom';} }
      else if(f.phase==='bloom')  { if(f.age>400&&!f.claimedBy){ f.phase='fadeout'; } }
      else if(f.phase==='visited'){ f.alpha=Math.max(0,f.alpha-0.005); if(f.alpha<=0) f.phase='done'; }
      else if(f.phase==='fadeout'){ f.alpha=Math.max(0,f.alpha-0.007); if(f.alpha<=0) f.phase='done'; }
      drawFlower(f);
    });

    // Update bees
    bees.forEach(b=>{
      b.wobble+=b.wobbleS;
      const prevX=b.x, prevY=b.y;

      if(b.state==='wander') {
        // Smooth random steering
        b.wanderTimer++;
        if(b.wanderTimer>30+Math.random()*60) {
          b.angle += (Math.random()-0.5)*1.2;
          b.wanderTimer=0;
          // Slightly bias toward side thirds
          const inCenter = b.x>W()*0.3 && b.x<W()*0.7;
          if(inCenter) b.angle += (b.x<W()*0.5 ? -0.3 : 0.3); // nudge outward
        }
        b.x += Math.cos(b.angle)*b.speed + Math.sin(b.wobble*1.5)*0.5;
        b.y += Math.sin(b.angle)*b.speed + Math.cos(b.wobble*2.1)*0.5;
        // Bounce off edges
        if(b.x<20||b.x>W()-20){ b.angle=Math.PI-b.angle; b.x=Math.max(20,Math.min(W()-20,b.x)); }
        if(b.y<20||b.y>H()-20){ b.angle=-b.angle; b.y=Math.max(20,Math.min(H()-20,b.y)); }

        // Scan for unclaimed bloom flowers in range
        const blooms=flowers.filter(f=>f.phase==='bloom'&&f.alpha>0.7&&!f.claimedBy);
        let nearest=null, nearDist=Infinity;
        blooms.forEach(f=>{ const d=Math.hypot(f.x-b.x,f.y-b.y); if(d<FLOWER_DETECT&&d<nearDist){nearDist=d;nearest=f;} });
        if(nearest) {
          // Claim it — first bee to detect wins
          nearest.claimedBy=b;
          b.target=nearest; b.state='chase';
        }
        drawBee(b, b.angle);

      } else if(b.state==='chase') {
        const tf=b.target;
        // If flower was stolen or gone, go back to wandering
        if(!tf||tf.phase==='done'||(tf.claimedBy&&tf.claimedBy!==b)) {
          b.state='wander'; b.target=null;
          return;
        }
        const dx=tf.x-b.x, dy=tf.y-b.y;
        const dist=Math.hypot(dx,dy);
        // Fly directly toward flower at higher speed
        b.x+=dx/dist*2.8; b.y+=dy/dist*2.8;
        b.angle=Math.atan2(dy,dx);
        drawBee(b,b.angle);
        if(dist<8) {
          b.state='land'; b.lx=tf.x; b.ly=tf.y; b.landTimer=0;
          tf.phase='visited';
        }
      } else if(b.state==='land') {
        b.x=b.lx; b.y=b.ly; b.landTimer++;
        drawBee(b,-Math.PI*0.5);
        if(b.landTimer>140){ b.state='liftoff'; b.landTimer=0; }
      } else if(b.state==='liftoff') {
        b.y-=1.8; b.x+=(Math.random()-0.5)*0.8; b.landTimer++;
        b.angle=-Math.PI*0.5+(Math.random()-0.5)*0.5;
        drawBee(b,b.angle);
        if(b.landTimer>80){ b.state='wander'; b.target=null; b.angle=Math.random()*Math.PI*2; }
      }
    });

    fxAnim=requestAnimationFrame(draw);
  }
  draw();
}

// ── AUTUMN: falling leaves ────────────────────────────────────────────────────
function startAutumn() {
  const colors=['#c05c18','#e8762a','#d4380a','#f0943c','#8b3a10','#f5b942'];
  const leaves = Array.from({length:40},()=>({
    x:Math.random()*canvas.width, y:-40-Math.random()*canvas.height,
    size:12+Math.random()*20, color:colors[Math.floor(Math.random()*colors.length)],
    vx:(Math.random()-0.5)*1.5, vy:0.8+Math.random()*1.2,
    rotation:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.05,
    swing:Math.random()*Math.PI*2, swingSpeed:0.03+Math.random()*0.03,
  }));
  function drawLeaf(l) {
    ctx.save(); ctx.translate(l.x,l.y); ctx.rotate(l.rotation);
    ctx.beginPath();
    ctx.moveTo(0,-l.size);
    ctx.bezierCurveTo(l.size*0.8,-l.size*0.5, l.size*0.9,l.size*0.2, 0,l.size*0.6);
    ctx.bezierCurveTo(-l.size*0.9,l.size*0.2, -l.size*0.8,-l.size*0.5, 0,-l.size);
    ctx.fillStyle=l.color; ctx.fill();
    // stem
    ctx.beginPath(); ctx.moveTo(0,l.size*0.6); ctx.lineTo(0,l.size);
    ctx.strokeStyle='#8b4513'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    leaves.forEach(l=>{
      l.swing += l.swingSpeed;
      l.x += l.vx + Math.sin(l.swing)*0.8;
      l.y += l.vy;
      l.rotation += l.rotSpeed;
      if(l.y>canvas.height+40){ l.y=-40; l.x=Math.random()*canvas.width; }
      drawLeaf(l);
    });
    fxAnim = requestAnimationFrame(draw);
  }
  draw();
}

// ── WINTER: white snowflakes ──────────────────────────────────────────────────
function startWinter() {
  const flakes = Array.from({length:140},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    size:1.5+Math.random()*4.5, speed:0.4+Math.random()*1.4,
    drift:Math.random()*Math.PI*2, driftSpeed:0.008+Math.random()*0.018,
    alpha:0.55+Math.random()*0.45, spin:Math.random()*Math.PI*2,
    spinSpeed:(Math.random()-0.5)*0.04,
    arms: Math.random()>0.5, // some are star-shaped, some are dots
  }));
  function drawFlake(f) {
    ctx.save(); ctx.translate(f.x,f.y); ctx.rotate(f.spin);
    ctx.globalAlpha = f.alpha;
    if (f.arms && f.size > 3) {
      // 6-pointed snowflake
      ctx.strokeStyle='#ffffff'; ctx.lineWidth=1.2;
      for(let i=0;i<6;i++){
        ctx.beginPath(); ctx.moveTo(0,0);
        ctx.lineTo(0,-f.size*1.8);
        // tiny cross arms
        ctx.moveTo(-f.size*0.5,-f.size*0.9); ctx.lineTo(f.size*0.5,-f.size*0.9);
        ctx.stroke(); ctx.rotate(Math.PI/3);
      }
    } else {
      ctx.beginPath(); ctx.arc(0,0,f.size,0,Math.PI*2);
      ctx.fillStyle='#ffffff'; ctx.fill();
    }
    ctx.globalAlpha=1; ctx.restore();
  }
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    flakes.forEach(f=>{
      f.drift += f.driftSpeed;
      f.spin += f.spinSpeed;
      f.x += Math.sin(f.drift)*0.6;
      f.y += f.speed;
      if(f.y>canvas.height+10){ f.y=-10; f.x=Math.random()*canvas.width; }
      drawFlake(f);
    });
    fxAnim = requestAnimationFrame(draw);
  }
  draw();
}

// ── SURVIVAL HORROR: flashlight + ambient flicker ────────────────────────────
let horrorMX=window.innerWidth/2, horrorMY=window.innerHeight/2;
let horrorHandlers=null;
function startHorror() {
  const overlay=document.getElementById('horror-overlay');
  const cursor=document.getElementById('horror-cursor');
  let flicker=0;

  function onMove(e) {
    const x=e.clientX||e.touches?.[0]?.clientX||horrorMX;
    const y=e.clientY||e.touches?.[0]?.clientY||horrorMY;
    horrorMX=x; horrorMY=y;
    cursor.style.left=x+'px'; cursor.style.top=y+'px';
    updateOverlay();
  }
  function updateOverlay() {
    flicker+=0.08;
    // Radius breathes slightly for that unstable flashlight feel
    const r = 130 + Math.sin(flicker)*8 + (Math.random()-0.5)*6;
    overlay.style.background=`radial-gradient(circle ${r}px at ${horrorMX}px ${horrorMY}px,
      transparent 0%,
      rgba(0,0,0,0.08) 55%,
      rgba(0,0,0,0.65) 82%,
      rgba(0,0,0,0.97) 100%)`;
    cursor.style.left=horrorMX+'px';
    cursor.style.top=horrorMY+'px';
  }

  // Ambient flicker loop
  function flickerLoop() {
    if(document.documentElement.getAttribute('data-theme')!=='horror') return;
    updateOverlay();
    fxAnim=requestAnimationFrame(flickerLoop);
  }

  document.addEventListener('mousemove',onMove);
  document.addEventListener('touchmove',onMove);
  horrorHandlers={onMove};
  flickerLoop();
}
function stopHorror() {
  if(horrorHandlers) {
    document.removeEventListener('mousemove',horrorHandlers.onMove);
    document.removeEventListener('touchmove',horrorHandlers.onMove);
    horrorHandlers=null;
  }
}
function startMatrix() {
  const cols = Math.floor(canvas.width/16);
  const drops = Array.from({length:cols},()=>Math.random()*-50);
  const chars='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ01アイウエオ';
  function draw() {
    ctx.fillStyle='rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    drops.forEach((y,i)=>{
      const ch = chars[Math.floor(Math.random()*chars.length)];
      const x = i*16;
      // bright leading char
      ctx.fillStyle='#aaffaa'; ctx.font='bold 14px monospace';
      ctx.fillText(ch,x,y*16);
      // trail
      ctx.fillStyle='#00cc33'; ctx.font='13px monospace';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)],x,(y-1)*16);
      ctx.fillStyle='rgba(0,180,40,0.5)';
      ctx.fillText(chars[Math.floor(Math.random()*chars.length)],x,(y-2)*16);
      if(y*16>canvas.height && Math.random()>0.975) drops[i]=0;
      else drops[i]+=0.4;
    });
    fxAnim = requestAnimationFrame(draw);
  }
  draw();
}

  function rule(label) {
    return new Paragraph({
      spacing:{before:240,after:80},
      border:{bottom:{style:BorderStyle.SINGLE,size:6,color:RULE,space:1}},

  function bul(text) {

    return new Paragraph({numbering:{reference:'bullets',level:0},spacing:{before:30,after:30},children:[new TextRun({text:clean,size:20,font:'Calibri',color:DARK})]});

  function skillRow(label,value) {

  const skills = currentProfile==='complete' ? D.skillsComplete : D.skillsCore;
  const children = [

  } else {

    children.push(new Paragraph({spacing:{before:0,after:0},children:[new TextRun({text:D.summary,size:20,font:'Calibri',color:DARK})]}));

    new Paragraph({spacing:{before:0,after:60},children:[new TextRun({text:j.tech.join(' · '),size:18,font:'Calibri',color:MID,italics:true})]});

    sections:[{properties:{page:{size:{width:12240,height:15840},margin:{top:1080,right:1260,bottom:1080,left:1260}}},children}]
  });

// ═══════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════════
function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type:mime}));
  a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function downloadBlob(blob, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function loadScript(src) {
  return new Promise((resolve,reject)=>{
    const s = document.createElement('script');
    s.src=src; s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}

// ═══════════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════════
function init() {
  let p='classic', t='light', f="'Outfit',system-ui,sans-serif";
  try{ p=localStorage.getItem('resume-profile')||'classic'; }catch(e){}
  try{ t=localStorage.getItem('resume-theme')||'dark'; }catch(e){}
  try{ f=localStorage.getItem('resume-font')||f; }catch(e){}

  document.getElementById('profile-picker').value = p;
  document.getElementById('theme-picker').value = t;
  document.getElementById('font-picker').value = f;

  render(p); currentProfile=p;
  setFont(f);
  setTheme(t);
}
init();
</script>
