<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan DeBraal — Resume</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Roboto:wght@300;400;500;700&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg:       #ffffff;
    --bg2:      #f8f9fb;
    --bg3:      #f0f2f5;
    --border:   #e2e6ea;
    --accent:   #1b4f8c;
    --accent2:  #2563b0;
    --gold:     #7c5a1e;
    --text:     #1a1a2e;
    --text2:    #4a5568;
    --text3:    #718096;
    --tag-bg:   #eef2f8;
    --tag-text: #1b4f8c;
    --tag-border:#c5d5eb;
    --tag-hover-bg:   #1b4f8c;
    --tag-hover-text: #ffffff;
    --rule:     #2c5f8a;
    --serif:    'DM Serif Display', Georgia, serif;
    --sans:     'Outfit', system-ui, sans-serif;
    --mono:     'DM Mono', monospace;
    --font-resume: 'Outfit', system-ui, sans-serif;
  }
  [data-theme="dark"] {
    --bg:       #0d0f12;
    --bg2:      #13161b;
    --bg3:      #1a1e25;
    --border:   #2a2f3a;
    --accent:   #6ba3e8;
    --accent2:  #90bbf0;
    --gold:     #c9a84c;
    --text:     #e8eaf0;
    --text2:    #9aa0b0;
    --text3:    #5c6275;
    --tag-bg:   #1a2030;
    --tag-text: #6ba3e8;
    --tag-border:#2a3a54;
    --tag-hover-bg:   #6ba3e8;
    --tag-hover-text: #0d0f12;
    --rule:     #3d6fa3;
    --serif:    'DM Serif Display', Georgia, serif;
    --sans:     'Outfit', system-ui, sans-serif;
    --mono:     'DM Mono', monospace;
    --font-resume: 'Outfit', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; -webkit-font-smoothing: antialiased; }

  body {
    font-family: var(--sans);
    background: var(--bg2);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  /* ── TOOLBAR ── */
  #toolbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #toolbar-name {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--text);
    margin-right: auto;
  }
  .tb-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg2);
    color: var(--text2);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tb-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--accent); }
  .tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tb-btn.primary:hover { opacity: 0.88; }
  .tb-btn svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

  /* ── DOCUMENT ── */
  #resume {
    max-width: 820px;
    margin: 32px auto;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 56px 64px;
    transition: background 0.2s, border-color 0.2s;
    font-family: var(--font-resume);
  }

  /* ── HEADER ── */
  .r-name {
    font-family: var(--serif);
    font-size: 38px;
    font-weight: 400;
    text-align: center;
    color: var(--text);
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .r-title {
    text-align: center;
    font-size: 13px;
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.03em;
    margin-bottom: 6px;
  }
  .r-contact {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
    border-bottom: 1.5px solid var(--rule);
    padding-bottom: 16px;
    margin-bottom: 0;
  }
  .r-contact a { color: var(--accent); text-decoration: none; }
  .r-contact a:hover { text-decoration: underline; }

  /* ── SECTION ── */
  .r-sec {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 4px;
    margin: 24px 0 12px;
  }

  /* ── SUMMARY ── */
  .r-summary {
    font-size: 13px;
    line-height: 1.75;
    color: var(--text2);
  }

  /* ── SKILLS ── */
  .r-skill-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    align-items: baseline;
    flex-wrap: wrap;
  }
  .r-skill-label {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    min-width: 160px;
  }
  .r-skill-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  /* ── TAG ── */
  .tag {
    display: inline-flex;
    align-items: center;
    font-family: var(--mono);
    font-size: 11px;
    padding: 2px 9px;
    background: var(--tag-bg);
    color: var(--tag-text);
    border: 1px solid var(--tag-border);
    border-radius: 20px;
    cursor: default;
    transition: all 0.12s;
    position: relative;
    white-space: nowrap;
  }
  .tag:hover {
    background: var(--tag-hover-bg);
    color: var(--tag-hover-text);
    border-color: var(--tag-hover-bg);
    transform: translateY(-1px);
    z-index: 10;
  }
  .tag[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 999;
    font-family: var(--sans);
  }
  .tag[data-tip]:hover::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 1px);
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--text);
    pointer-events: none;
    z-index: 999;
  }

  /* ── EXPERIENCE ── */
  .r-job { margin-bottom: 22px; }
  .r-job:last-child { margin-bottom: 0; }
  .r-job-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 2px;
  }
  .r-job-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }
  .r-job-company {
    font-size: 14px;
    font-weight: 400;
    color: var(--accent);
  }
  .r-job-dates {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }
  .r-job-meta {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .r-job-tech {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 8px;
  }
  .r-job-bullets {
    list-style: none;
    padding: 0;
  }
  .r-job-bullets li {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text2);
    padding-left: 16px;
    position: relative;
    margin-bottom: 4px;
  }
  .r-job-bullets li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 10px;
    top: 3px;
  }
  .r-job-bullets li strong {
    color: var(--text);
    font-weight: 500;
  }

  /* ── PROJECTS ── */
  .r-project { margin-bottom: 10px; }
  .r-project-name {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
    display: inline;
  }
  .r-project-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    display: inline;
  }

  /* ── EDUCATION ── */
  .r-edu-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 4px;
  }
  .r-edu-degree { font-size: 13px; font-weight: 500; color: var(--text); }
  .r-edu-school { font-size: 13px; color: var(--text2); }
  .r-edu-dates  { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .r-edu-note   { font-size: 12px; color: var(--accent); font-style: italic; }

  /* ── PATENTS ── */
  .r-patent { margin-bottom: 8px; }
  .r-patent-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .r-patent-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    margin-left: 6px;
  }
  .r-patent-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; }
    #toolbar { display: none !important; }
    #resume {
      margin: 0;
      border: none;
      border-radius: 0;
      padding: 32px 48px;
      max-width: 100%;
      background: #fff;
      font-family: var(--font-resume);
    }
    :root {
      --bg: #fff; --bg2: #fff; --text: #1a1a2e; --text2: #4a5568;
      --text3: #718096; --accent: #1b4f8c; --rule: #2c5f8a;
      --tag-bg: #eef2f8; --tag-text: #1b4f8c; --tag-border: #c5d5eb;
      --border: #e2e6ea;
    }
    .tag:hover { transform: none; }
  }
</style>
</head>
<body>

<div id="toolbar">

// ── DATA ─────────────────────────────────────────────────────────────────────

// ── RENDER ────────────────────────────────────────────────────────────────────
function makeTag(text) {
  const tip = techTips[text] || '';
  return `<span class="tag"${tip ? ` data-tip="${tip.replace(/"/g,'&quot;')}"` : ''}>${text}</span>`;
}

function render() {
  document.getElementById('r-summary').textContent = resumeData.summary;

  // Skills
  const skillsEl = document.getElementById('r-skills');
  skillsEl.innerHTML = resumeData.skills.map(s => `
    <div class="r-skill-row">
      <span class="r-skill-label">${s.label}</span>
      <div class="r-skill-tags">${s.items.map(makeTag).join('')}</div>
    </div>`).join('');

  // Experience
  const expEl = document.getElementById('r-experience');
  expEl.innerHTML = resumeData.experience.map(job => `
    <div class="r-job">
      <div class="r-job-header">
        <div>
          <span class="r-job-title">${job.title}</span>
          <span style="color:var(--text3);margin:0 6px;">·</span>
          <span class="r-job-company">${job.company}</span>
        </div>
        <span class="r-job-dates">${job.dates}</span>
      </div>
      <div class="r-job-meta">${job.location}</div>
      <div class="r-job-tech">${job.tech.map(makeTag).join('')}</div>
      <ul class="r-job-bullets">
        ${job.bullets.map(b => `<li>${b}</li>`).join('')}
      </ul>
    </div>`).join('');

  // Projects
  const projEl = document.getElementById('r-projects');
  projEl.innerHTML = resumeData.projects.map(p => `
    <div class="r-project">
      <span class="r-project-name">${p.name}</span>
      <span style="color:var(--text3)"> — </span>
      <span class="r-project-desc">${p.desc}</span>
    </div>`).join('');

  // Education
  const eduEl = document.getElementById('r-education');
  eduEl.innerHTML = resumeData.education.map(e => `
    <div class="r-edu-row">
      <div>
        <span class="r-edu-degree">${e.degree}</span>
        <span style="color:var(--text3);margin:0 8px;">·</span>
        <span class="r-edu-school">${e.school}</span>
        ${e.note ? `<span style="color:var(--text3);margin:0 8px;">·</span><span class="r-edu-note">${e.note}</span>` : ''}
      </div>
      <span class="r-edu-dates">${e.dates}</span>
    </div>`).join('');

  // Patents
  const patEl = document.getElementById('r-patents');
  patEl.innerHTML = resumeData.patents.map(p => `
    <div class="r-patent">
      <span class="r-patent-title">${p.title}</span>
      <span class="r-patent-num">(${p.num})</span>
      <div class="r-patent-desc">${p.desc}</div>
    </div>`).join('');
}

// ── FONT ──────────────────────────────────────────────────────────────────────
function setFont(fontStack) {
  document.documentElement.style.setProperty('--font-resume', fontStack);
  document.getElementById('font-picker').style.fontFamily = fontStack;
  try { localStorage.setItem('resume-font', fontStack); } catch(e) {}
}

function initFont() {
  try {
    const saved = localStorage.getItem('resume-font');
    if (saved) {
      setFont(saved);
      const picker = document.getElementById('font-picker');
      // find matching option
      Array.from(picker.options).forEach(opt => {
        if (opt.value === saved) picker.value = saved;
      });
    }
  } catch(e) {}
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-label').textContent = isDark ? 'Dark mode' : 'Light mode';
}

// ── PDF EXPORT ────────────────────────────────────────────────────────────────
function exportPDF() {
  // Force light mode for PDF
  const html = document.documentElement;
  const wasTheme = html.getAttribute('data-theme');
  html.setAttribute('data-theme', 'light');

  const toolbar = document.getElementById('toolbar');
  toolbar.style.display = 'none';

  // Small delay so styles apply
  setTimeout(() => {
    window.print();
    // Restore after print dialog
    setTimeout(() => {
      html.setAttribute('data-theme', wasTheme);
      toolbar.style.display = '';
    }, 500);
  }, 100);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
initFont();
</script>
</body>
</html>
